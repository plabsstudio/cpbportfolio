<head>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a96e;
            --gold-dim: rgba(201, 169, 110, 0.12);
            --bg: #05050f;
            --surface: rgba(7, 7, 20, 0.98);
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 22px 36px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(5,5,15,0.95) 0%, transparent 100%);
        }
        .logo { font-size: 1rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #ffffff; }
        .logo span { color: rgba(255,255,255,0.3); font-weight: 300; margin-left: 10px; letter-spacing: 0.08em; font-size: 0.7rem; text-transform: none; }
        .badge {
            padding: 5px 14px; border: 1px solid rgba(201,169,110,0.22); border-radius: 100px;
            color: rgba(255,255,255,0.35); font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase;
        }

        /* ── CANVAS ── */
        #universe { position: absolute; inset: 0; }

        /* ── HINT ── */
        .hint {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.22); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
            pointer-events: none; animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:.22} 50%{opacity:.55} }

        /* ── OVERLAY ── */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
            z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.35s ease;
        }
        .overlay.visible { opacity: 1; pointer-events: all; }

        /* ── PANEL ── */
        .panel {
            position: fixed; top: 0; right: -100%;
            width: min(560px, 100vw); height: 100vh;
            background: var(--surface);
            border-left: 1px solid rgba(201,169,110,0.15);
            z-index: 200;
            transition: right 0.52s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; padding: 68px 42px 50px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.18) transparent;
        }
        .panel.open { right: 0; }
        .panel::-webkit-scrollbar { width: 3px; }
        .panel::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.18); border-radius: 2px; }

        .panel-close {
            position: absolute; top: 20px; right: 20px; width: 34px; height: 34px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
            background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center; transition: all 0.22s;
        }
        .panel-close:hover { border-color: var(--gold); color: var(--gold); }

        .panel-tag { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
        .panel-title {
            font-size: 1.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 26px;
            background: linear-gradient(135deg, #fff 55%, rgba(201,169,110,0.75));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .panel-body { color: rgba(255,255,255,0.62); font-size: 0.9rem; line-height: 1.8; }
        .panel-body p { margin-bottom: 10px; }

        /* ── SECTION LABEL ── */
        .sl { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin: 20px 0 9px; }

        /* ── METRIC GRID ── */
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .metric-card { background: var(--gold-dim); border: 1px solid rgba(201,169,110,0.16); border-radius: 12px; padding: 18px; transition: border-color 0.2s; }
        .metric-card:hover { border-color: rgba(201,169,110,0.4); }
        .metric-value { font-size: 1.9rem; font-weight: 800; color: var(--gold); line-height: 1; }
        .metric-label { font-size: 0.68rem; color: rgba(255,255,255,0.4); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.1em; }

        /* ── SKILL TAGS ── */
        .tag { display: inline-block; padding: 5px 13px; border-radius: 100px; border: 1px solid rgba(201,169,110,0.26); color: var(--gold); font-size: 0.7rem; margin: 3px; letter-spacing: 0.05em; transition: all 0.18s; }
        .tag:hover { background: var(--gold-dim); }

        /* ── VIDEO BLOCK ── */
        .video-block { width: 100%; aspect-ratio: 16/9; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; overflow: hidden; margin: 14px 0; }
        .video-block iframe { width: 100%; height: 100%; border: none; }
        .video-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: rgba(255,255,255,0.2); font-size: 0.75rem; cursor: pointer; transition: color 0.25s; }
        .video-ph:hover { color: var(--gold); }
        .video-ph .play { font-size: 1.8rem; }

        /* ── REEL GRID (vertical 9:16) ── */
        .reel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
        .reel-wrap {
            aspect-ratio: 9/16; border-radius: 10px; overflow: hidden;
            background: #000; position: relative; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.07);
            transition: border-color 0.2s;
        }
        .reel-wrap:hover { border-color: rgba(249,115,22,0.5); }
        .reel-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .reel-wrap .reel-icon {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: rgba(255,255,255,0.5); pointer-events: none;
            transition: opacity 0.2s;
        }
        .reel-wrap.playing .reel-icon { opacity: 0; }

        /* ── IMAGE GRID ── */
        .img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin: 16px 0; }
        .img-slot { aspect-ratio: 4/3; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.18); font-size: 0.68rem; }
        .img-slot img { width: 100%; height: 100%; object-fit: cover; }

        /* ── CONTACT LINK ── */
        .clink { display: flex; align-items: center; gap: 13px; padding: 16px 20px; border: 1px solid rgba(201,169,110,0.16); border-radius: 12px; color: #fff; text-decoration: none; transition: all 0.22s; margin-bottom: 10px; }
        .clink:hover { border-color: rgba(201,169,110,0.5); background: var(--gold-dim); }
        .cicon { color: var(--gold); font-size: 1rem; min-width: 18px; }

        /* ── TOOLTIP ── */
        .tooltip { position: fixed; padding: 7px 13px; background: rgba(8,8,22,0.96); border: 1px solid rgba(201,169,110,0.28); border-radius: 7px; font-size: 0.72rem; color: rgba(255,255,255,0.65); pointer-events: none; opacity: 0; transition: opacity 0.18s; z-index: 130; }

        /* ── SUB-NODE LEGEND ── */
        .subnote { font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.06); }
    </style>
</head>

let W = window.innerWidth, H = window.innerHeight;

const svg = d3.select("#universe").append("svg").attr("width", W).attr("height", H);

// ── Defs
const defs = svg.append("defs");

const glow = defs.append("filter").attr("id", "glow").attr("x", "-60%").attr("y", "-60%").attr("width", "220%").attr("height", "220%");
glow.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", "7").attr("result", "blur");
const gm = glow.append("feMerge");
gm.append("feMergeNode").attr("in", "blur");
gm.append("feMergeNode").attr("in", "SourceGraphic");

const glowS = defs.append("filter").attr("id", "glowS");
glowS.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", "2.5").attr("result", "blur");
const gmS = glowS.append("feMerge");
gmS.append("feMergeNode").attr("in", "blur");
gmS.append("feMergeNode").attr("in", "SourceGraphic");

// ── Stars
const starG = svg.append("g");
for (let i = 0; i < 130; i++) {
    const r = Math.random();
    starG.append("circle")
        .attr("cx", Math.random() * W).attr("cy", Math.random() * H)
        .attr("r", r * 1.3 + 0.15)
        .attr("fill", `rgba(255,255,255,${r * 0.3 + 0.04})`);
}

// ── Simulation
const sim = d3.forceSimulation(NODES)
    .force("link", d3.forceLink(LINKS).id(d => d.id)
        .distance(d => {
            if (d.type === "sub")   return 130;
            if (d.type === "cross") return 200;
            return 230;
        })
        .strength(d => d.type === "sub" ? 0.8 : d.type === "cross" ? 0.1 : 0.4)
    )
    .force("charge", d3.forceManyBody().strength(d => d.type === "subnode" ? -120 : -480))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collide", d3.forceCollide().radius(d => d.size + (d.type === "subnode" ? 18 : 26)).strength(0.85));

// ── Link layer
const linkG = svg.append("g");
const linkEl = linkG.selectAll("line").data(LINKS).enter().append("line")
    .attr("stroke", d => {
        const src = NODES.find(n => n.id === (d.source.id || d.source));
        return src ? src.color : "#444";
    })
    .attr("stroke-opacity", d => d.type === "sub" ? 0.35 : d.type === "cross" ? 0.08 : 0.16)
    .attr("stroke-width", d => d.type === "sub" ? 1.8 : 1.2)
    .attr("stroke-dasharray", d => d.type === "cross" ? "3 6" : null)
    .attr("filter", "url(#glowS)");

// ── Node groups
const nodeG = svg.append("g");
const nodeEl = nodeG.selectAll("g").data(NODES).enter().append("g")
    .attr("cursor", "pointer")
    .call(d3.drag()
        .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on("click",      (e, d) => openPanel(d))
    .on("mouseenter", (e, d) => showTooltip(e, d))
    .on("mousemove",  (e)    => moveTooltip(e))
    .on("mouseleave", ()     => hideTooltip());

// Outer ring
nodeEl.append("circle").attr("class", "ring")
    .attr("r", d => d.size + (d.type === "center" ? 16 : d.type === "subnode" ? 8 : 13))
    .attr("fill", "none")
    .attr("stroke", d => d.color)
    .attr("stroke-opacity", d => d.type === "center" ? 0.2 : 0.06)
    .attr("stroke-width", d => d.type === "center" ? 1.5 : 1);

// Dashed outer ring for center
nodeEl.filter(d => d.type === "center").append("circle")
    .attr("r", d => d.size + 34)
    .attr("fill", "none")
    .attr("stroke", d => d.color)
    .attr("stroke-opacity", 0.07)
    .attr("stroke-width", 1)
    .attr("stroke-dasharray", "5 10");

// Main circle
nodeEl.append("circle").attr("class", "main")
    .attr("r", d => d.size)
    .attr("fill", d => d.type === "center" ? d.color : d.type === "subnode" ? `rgba(8,8,22,0.92)` : "rgba(8,8,22,0.95)")
    .attr("stroke", d => d.color)
    .attr("stroke-width", d => d.type === "center" ? 2.5 : d.type === "subnode" ? 1 : 1.5)
    .attr("stroke-opacity", d => d.type === "center" ? 1 : d.type === "subnode" ? 0.5 : 0.7)
    .attr("filter", d => d.type === "center" ? "url(#glow)" : null);

// Main label
nodeEl.append("text")
    .attr("text-anchor", "middle")
    .attr("fill", d => d.type === "center" ? "#05050f" : "#fff")
    .attr("font-size", d => d.type === "center" ? "11px" : d.type === "subnode" ? "9.5px" : "10.5px")
    .attr("font-weight", "700")
    .attr("letter-spacing", "0.1em")
    .attr("pointer-events", "none")
    .attr("y", d => d.sublabel ? "-6" : "0")
    .attr("dominant-baseline", "middle")
    .text(d => d.label);

// Sub-label (for nodes with two-line text)
nodeEl.filter(d => d.sublabel).append("text")
    .attr("text-anchor", "middle")
    .attr("dominant-baseline", "middle")
    .attr("y", d => d.type === "center" ? 9 : 8)
    .attr("fill", d => d.type === "center" ? "rgba(5,5,15,0.6)" : "rgba(255,255,255,0.55)")
    .attr("font-size", d => d.type === "center" ? "11px" : "9px")
    .attr("font-weight", d => d.type === "center" ? "700" : "500")
    .attr("letter-spacing", "0.1em")
    .attr("pointer-events", "none")
    .text(d => d.sublabel);

// Hover
nodeEl
    .on("mouseenter.hover", function(e, d) {
        d3.select(this).select(".main")
            .transition().duration(160).attr("r", d.size + 4).attr("stroke-opacity", 1);
        d3.select(this).select(".ring")
            .transition().duration(160).attr("stroke-opacity", d.type === "center" ? 0.38 : 0.22);
    })
    .on("mouseleave.hover", function(e, d) {
        d3.select(this).select(".main")
            .transition().duration(220).attr("r", d.size)
            .attr("stroke-opacity", d.type === "center" ? 1 : d.type === "subnode" ? 0.5 : 0.7);
        d3.select(this).select(".ring")
            .transition().duration(220).attr("stroke-opacity", d.type === "center" ? 0.2 : 0.06);
    });

// ── Tick
sim.on("tick", () => {
    // Keep all nodes within visible bounds
    NODES.forEach(d => {
        const pad = d.size + 14;
        d.x = Math.max(pad, Math.min(W - pad, d.x));
        d.y = Math.max(pad + 55, Math.min(H - pad - 30, d.y));
    });
    linkEl
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeEl.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ── Tooltip
const tooltip = document.getElementById("tooltip");
function showTooltip(e, d) {
    if (d.type === "center") return;
    tooltip.textContent = d.content.tag;
    tooltip.style.opacity = "1";
    moveTooltip(e);
}
function moveTooltip(e) {
    tooltip.style.left = (e.clientX + 16) + "px";
    tooltip.style.top  = (e.clientY - 10) + "px";
}
function hideTooltip() { tooltip.style.opacity = "0"; }

// ── Panel
const panel   = document.getElementById("panel");
const overlay = document.getElementById("overlay");

function openPanel(d) {
    currentNode = d;
    const c = (currentLang === 'en' && CONTENT_EN[d.id]) ? CONTENT_EN[d.id] : d.content;
    document.getElementById("panelTag").textContent  = c.tag;
    document.getElementById("panelTitle").textContent = c.title;
    document.getElementById("panelBody").innerHTML    = c.body;
    panel.classList.add("open");
    overlay.classList.add("visible");
    nodeEl.select(".ring").attr("stroke-opacity", n =>
        n.id === d.id ? 0.5 : n.type === "center" ? 0.2 : 0.06
    );

    // ── Reel interactions (hover = muted autoplay, click = sound + pause others)
    const reelGrid = document.getElementById("reelGrid");
    if (reelGrid) {
        const wraps = reelGrid.querySelectorAll(".reel-wrap");
        wraps.forEach(wrap => {
            const vid = wrap.querySelector("video");

            wrap.addEventListener("mouseenter", () => {
                vid.muted = true;
                vid.play().catch(() => {});
                wrap.classList.add("playing");
            });

            wrap.addEventListener("mouseleave", () => {
                if (vid.muted) {
                    vid.pause();
                    vid.currentTime = 0;
                    wrap.classList.remove("playing");
                }
            });

            wrap.addEventListener("click", () => {
                // Pause & mute all others
                wraps.forEach(other => {
                    if (other !== wrap) {
                        const ov = other.querySelector("video");
                        ov.pause();
                        ov.muted = true;
                        ov.currentTime = 0;
                        other.classList.remove("playing");
                    }
                });
                // Play this one with sound
                vid.muted = false;
                vid.loop = false;
                vid.play().catch(() => {});
                wrap.classList.add("playing");
            });
        });
    }
}
function closePanel() {
    // Pause all videos when closing
    panel.querySelectorAll("video").forEach(v => { v.pause(); v.currentTime = 0; });
    panel.classList.remove("open");
    overlay.classList.remove("visible");
    nodeEl.select(".ring").attr("stroke-opacity", d => d.type === "center" ? 0.2 : 0.06);
    currentNode = null;
}

document.getElementById("panelClose").addEventListener("click", closePanel);
overlay.addEventListener("click", closePanel);
document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });

window.addEventListener("resize", () => {
    W = window.innerWidth; H = window.innerHeight;
    svg.attr("width", W).attr("height", H);

});

linkEl.attr("opacity", 0).transition().duration(600).delay(600).attr("opacity", 1);

function toggleLang() {
    currentLang = currentLang === 'es' ? 'en' : 'es';
    const btn = document.getElementById('langBtn');
    btn.textContent = currentLang === 'es' ? 'EN' : 'ES';
    document.getElementById('badgeEl').textContent = UI_TRANS[currentLang].badge;
    document.getElementById('hintEl').textContent  = UI_TRANS[currentLang].hint;

    // Update node circle labels
    nodeEl.each(function(d) {
        const t = LABEL_TRANS[d.id];
        if (t) d3.select(this).select('text').text(t[currentLang]);
    });

    // Re-render panel if open
    if (currentNode && panel.classList.contains('open')) {
        const c = (currentLang === 'en' && CONTENT_EN[currentNode.id])
            ? CONTENT_EN[currentNode.id]
            : currentNode.content;
        document.getElementById('panelTag').textContent   = c.tag;
        document.getElementById('panelTitle').textContent = c.title;
        document.getElementById('panelBody').innerHTML    = c.body;
    }
}
